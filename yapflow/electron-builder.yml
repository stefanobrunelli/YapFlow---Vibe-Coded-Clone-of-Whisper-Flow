appId: ${env.YAPFLOW_APP_ID}
productName: ${env.YAPFLOW_PRODUCT_NAME}
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: ${env.YAPFLOW_OUTPUT_DIR}

files:
  - out/**/*
  - "!out/**/*.map"

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

dmg:
  sign: false
  title: "${env.YAPFLOW_PRODUCT_NAME} ${version}"

# afterSign: scripts/notarize.js  # Uncomment when you have Apple notarization credentials

extraResources:
  - from: resources/whisperflow_tray_32x32.png
    to: resources/whisperflow_tray_32x32.png

asar: true
asarUnpack:
  # Native modules must be unpacked — they are binary .node files
  # that cannot run from inside an asar archive
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/uiohook-napi/prebuilds/**/*"

nsis:
  # macOS-only app — no Windows installer needed
