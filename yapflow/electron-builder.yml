appId: com.yapflow.app
productName: YapFlow
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: ${env.YAPFLOW_OUTPUT_DIR}

files:
  - out/**/*
  - "!out/**/*.map"

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  # Private-tester builds use one stable local signing identity for every
  # bundle/framework/native binary. scripts/run-electron-builder.mjs sets
  # CSC_NAME to "YapFlow Local Signer" unless the caller overrides it.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64

dmg:
  sign: false
  title: "${productName} ${version}"

# afterSign: scripts/notarize.js  # Uncomment when you have Apple notarization credentials

extraResources:
  - from: resources/whisperflow_tray_32x32.png
    to: resources/whisperflow_tray_32x32.png

asar: true
asarUnpack:
  # Native modules must be unpacked — they are binary .node files
  # that cannot run from inside an asar archive
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/uiohook-napi/prebuilds/**/*"
  # uiohook-napi loads its native binary through node-gyp-build at runtime,
  # so the helper package must be available from the unpacked module tree too.
  - "node_modules/node-gyp-build/**/*"

nsis:
  # macOS-only app — no Windows installer needed
